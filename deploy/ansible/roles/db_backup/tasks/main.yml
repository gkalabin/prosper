---
# Nightly dump timer. Pushes to backup_repo, so leave it unset on hosts that
# must never write to the shared repo (e.g. staging).
- name: Install nightly backup timer
  when: backup_repo | length > 0
  block:
    - name: Create backup checkout directory
      file:
        path: '{{ backup_dir }}'
        state: directory
        owner: '{{ service_user }}'
        group: '{{ service_user }}'
        mode: '0755'

    - name: Clone backup repo as service user
      git:
        repo: '{{ backup_repo }}'
        dest: '{{ backup_dir }}'
        version: main
      become_user: '{{ service_user }}'

    # The service user has no global git identity; without one in the checkout
    # the backup commit fails.
    - name: Set git identity for backup commits
      community.general.git_config:
        repo: '{{ backup_dir }}'
        scope: local
        name: '{{ item.name }}'
        value: '{{ item.value }}'
      loop:
        - {name: user.name, value: '{{ backup_git_name }}'}
        - {name: user.email, value: '{{ backup_git_email }}'}
      become_user: '{{ service_user }}'

    - name: Ensure backup log exists
      file:
        path: '{{ backup_log }}'
        state: touch
        owner: '{{ service_user }}'
        group: '{{ service_user }}'
        mode: '0644'

    - name: Install backup script
      copy:
        src: '{{ src_dir }}/scripts/db/backup.sh'
        dest: '{{ bin_dir }}/backup.sh'
        mode: '0755'

    - name: Install make_prosper_backup command
      template:
        src: make_prosper_backup.j2
        dest: /usr/local/bin/make_prosper_backup
        mode: '0755'

    - name: Install systemd service for backup run
      template:
        src: prosper-db-backup.service.j2
        dest: /etc/systemd/system/prosper-db-backup.service
        mode: '0644'
      notify: reload systemd

    - name: Install systemd timer for daily backup
      template:
        src: prosper-db-backup.timer.j2
        dest: /etc/systemd/system/prosper-db-backup.timer
        mode: '0644'
      notify: reload systemd

    - name: Enable and start backup timer
      systemd:
        name: prosper-db-backup.timer
        state: started
        enabled: true
        daemon_reload: true
