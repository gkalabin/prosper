version: v2
plugins:
  - local: protoc-gen-go
    out: ../backend/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../backend/gen
    opt: paths=source_relative
  - local: ../frontend/node_modules/.bin/protoc-gen-ts
    out: ../frontend/lib/grpc/gen
    opt:
      - generate_dependencies
      - long_type_bigint
