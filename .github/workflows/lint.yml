name: Lint

on:
  push:
  pull_request:

jobs:
  # Runs the polyglot lint suite defined in lefthook.yml.
  lefthook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json
      - uses: actions/setup-go@v5
        with: {go-version: '1.25'}
      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          setup_only: true
      - run: cargo install typos-cli --version 1.46.2 --locked
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.12.2
          install-mode: binary
          install-only: true
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: npm install -g lefthook@2.1.8
      - run: npm ci # Install prettier
      - run: npm ci --prefix frontend
      - run: npm ci --prefix e2e
      - run: lefthook run lint
