name: Lint

on:
  push:
  pull_request:

jobs:
  # Runs the polyglot lint suite defined in lefthook.yml.
  lefthook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: {go-version: '1.25'}
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          input: proto
          setup_only: true
      - run: cargo install typos-cli --version 1.46.2 --locked
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          install-mode: binary
          install-only: true
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: npm install -g lefthook@2.1.8
      - run: npm ci # Install prettier
      - run: npm ci --prefix frontend
      - run: npm ci --prefix e2e
      - run: lefthook run lint
