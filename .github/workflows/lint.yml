name: Lint

on:
  push:
  pull_request:

jobs:
  # Runs the polyglot lint suite defined in lefthook.yml.
  lefthook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: {go-version: '1.25'}
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          input: proto
          setup_only: true
      - run: cargo install typos-cli --version 1.46.2 --locked
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12.2
          install-mode: binary
          install-only: true
      - run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - run: npm install -g lefthook@2.1.8
      - run: npm ci # Install prettier
      - run: npm ci --prefix frontend
      - run: npm ci --prefix e2e
      - run: lefthook run lint
