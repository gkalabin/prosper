name: Proto

on:
  push:
  pull_request:

jobs:
  # Regenerates the proto code and fails if it differs from the committed
  # version, catching changes to .proto files that were not re-run through
  # `make proto`.
  verify-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: {go-version: '1.25'}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          input: proto
          setup_only: true
      # Versions must match scripts/setup_dev_environment.sh.
      - run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
      - run: go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
      - run: npm ci --prefix frontend # Install protoc-gen-ts.
      - run: make proto
      - name: Verify generated code matches committed version
        run: |
          if [ -n "$(git status --porcelain backend/gen frontend/lib/grpc/gen)" ]; then
            echo "::error::Generated proto code is out of date. Run 'make proto' and commit the result."
            git status --porcelain backend/gen frontend/lib/grpc/gen
            git diff -- backend/gen frontend/lib/grpc/gen
            exit 1
          fi
